<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="assets/weather-fav-icon.png" type="image/png" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+20&family=Google+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <section id="weather-wrapper">
      <h1>Weather App</h1>

      <div id="weather-search">
        <input type="text" id="searchInput" placeholder="Search by city" autocomplete="off" />
        <button id="searchBtn">search</button>
      </div>

      <div id="errorBox"></div>

      <div id="weather-data" style="display: none;"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
